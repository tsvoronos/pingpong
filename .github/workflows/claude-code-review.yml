name: Claude Code Review

on:
  pull_request:
    types: [opened]
    paths: [web/**, pingpong/**, .github/workflows/**, conftest.py, uv.lock, pyproject.toml]
  issue_comment:
    types: [created]

jobs:
  detect-claude-command:
    name: Claude Review Check
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(
        fromJson('["OWNER","MEMBER","COLLABORATOR"]'),
        github.event.comment.author_association
      )
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      run_review: ${{ steps.check.outputs.run_review }}
    steps:
      - name: Check for @claude review on its own line
        id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          has_review_command="$(python - <<'PY'
          import os

          body = os.environ.get("COMMENT_BODY", "")
          print(
              "true"
              if any(line.strip() == "@claude review" for line in body.splitlines())
              else "false"
          )
          PY
          )"
          if [ "$has_review_command" = "true" ]; then
            echo "run_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_review=false" >> "$GITHUB_OUTPUT"
          fi
  claude-review:
    name: Run Claude Code Review
    needs: [detect-claude-command]
    if: |
      always() &&
      (
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.type != 'Bot' &&
          github.event.pull_request.draft == false &&
          contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) &&
          !contains(github.event.pull_request.labels.*.name, 'skip-ai-review') &&
          !contains(github.event.pull_request.labels.*.name, 'dependencies') &&
          !contains(github.event.pull_request.labels.*.name, 'chore')
        ) ||
        needs.detect-claude-command.outputs.run_review == 'true'
      )
    runs-on:
      ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout pinned Claude plugins source
        uses: actions/checkout@v6
        with:
          repository: anthropics/claude-code
          # Pin plugin source to an immutable commit to avoid untrusted upstream drift.
          ref: 2dc1e697836e94f3e9b7b8f19e6fb4a3622e3cca
          path: claude-plugins-src
          fetch-depth: 1

      - name: Verify pinned code-review plugin source
        run: |
          test -f "${GITHUB_WORKSPACE}/claude-plugins-src/plugins/code-review/.claude-plugin/plugin.json"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@b47fd721da662d48c5680e154ad16a73ed74d2e0
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: >-
            ${{
              (
                github.event_name == 'pull_request' &&
                contains(fromJson('["opened","synchronize","ready_for_review","reopened"]'), github.event.action)
              ) ||
              (
                github.event_name == 'issues' &&
                contains(fromJson('["opened","edited","labeled","assigned"]'), github.event.action)
              )
            }}
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ env.PR_NUMBER }}'

          # Tools based on CLAUDE.md development commands
          # Includes: uv (pytest, alembic, python), pnpm (check, lint, test), and gh CLI
          claude_args: '--plugin-dir "${{ github.workspace }}/claude-plugins-src/plugins/code-review" --allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(uv run pytest:*),Bash(uv run alembic:*),Bash(uv run python:*),Bash(uv sync:*),Bash(pnpm install:*),Bash(pnpm check:*),Bash(pnpm lint:*),Bash(pnpm format:*),Bash(pnpm test:*),Bash(pnpm build:*),Bash(gh issue:*),Bash(gh pr:*),Bash(gh search:*)" --model claude-opus-4-6'
