<!doctype html>
<html lang="en">
	<head>
		<title>PingPong 🏓</title>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Rubik+Doodle+Shadow&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=STIX+Two+Text:ital,wght@0,300..700;1,300..700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="%sveltekit.assets%/default.min.css" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		%sveltekit.head%
	</head>
	<body
		ondragover="event.preventDefault()"
		ondrop="event.preventDefault()"
		data-sveltekit-preload-data="hover"
		class="h-min-screen v-min-screen bg-blue-dark-50"
	>
		<div
			id="loading-screen"
			style="
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				background: #201e45;
			"
		>
			<img
				src="%sveltekit.assets%/pingpong_logo_2x.png"
				alt="PingPong"
				style="max-width: 300px; width: 80%"
			/>
			<div
				id="loading-screen-spinner"
				style="
					margin-top: 32px;
					box-sizing: content-box;
					width: 32px;
					height: 32px;
					border: 3.5px solid rgba(255, 255, 255, 0.2);
					border-top-color: #fc624d;
					border-radius: 50%;
					animation: pp-spin 1s linear infinite;
				"
			></div>
			<style>
				@keyframes pp-spin {
					to {
						transform: rotate(360deg);
					}
				}
				@media (prefers-reduced-motion: reduce) {
					#loading-screen-spinner {
						animation: none !important;
					}
				}
			</style>
		</div>
		<div class="mx-auto mt-12 max-w-screen-2xl lg:h-[calc(100vh-3rem)]">%sveltekit.body%</div>
	</body>
</html>
